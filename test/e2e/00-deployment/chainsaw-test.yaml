apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: infra
spec:
  timeouts:
    assert: 2m
  namespace: kube-system
  steps:
  - name: Validate CoreDNS
    try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            labels:
              k8s-app: vcluster-kube-dns
              kubernetes.io/name: CoreDNS
            name: coredns
            namespace: kube-system
          status:
            availableReplicas: 1
            observedGeneration: 1
            readyReplicas: 1
            replicas: 1
            updatedReplicas: 1

