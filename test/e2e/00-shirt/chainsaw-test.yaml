apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: shirt
spec:
  skipDelete: true
  steps:
  - name: Create custom resource
    try:
    - sleep:
        duration: 5s
    - apply:
        file: https://raw.githubusercontent.com/kubernetes/website/main/content/en/examples/customresourcedefinition/shirt-resource-definition.yaml
    - assert:
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: shirts.stable.example.com
    - apply:
        resource:
          apiVersion: stable.example.com/v1
          kind: Shirt
          metadata:
            name: example1
          spec:
            color: blue
            size: S
    - assert:
        resource:
          apiVersion: stable.example.com/v1
          kind: Shirt
          metadata:
            name: example1
