{{- if .Values.vcluster.networkPolicy.create -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    {{- include "harikube.labels" . | nindent 4 }}
  name: harikube-vcluster-netpol
  namespace: {{ .Release.Namespace }}
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          harikube.info/{{ .Release.Namespace }}-vcluster: enabled
    ports:
    - port: 8443
      protocol: TCP
  podSelector:
    matchLabels:
      app: vcluster
      release: harikube-vcluster
  policyTypes:
  - Ingress
{{- end }}
