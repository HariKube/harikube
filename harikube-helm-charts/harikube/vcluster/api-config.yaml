controlPlane:
  distro:
    k8s:
      enabled: true
      image:
        registry: quay.io
        repository: harikube/kubernetes
        tag: v1.36.0
      imagePullPolicy: IfNotPresent
      apiServer:
        enabled: true
        extraArgs:
        - --feature-gates=WatchList=true,WatchListClient=true,VolumeAttributesClass=true,MutatingAdmissionPolicy=true,CustomResourceFieldSelectors=true
        - --watch-cache=false
        - --etcd-servers=https://harikube-middleware-svc:2379
        - --etcd-cafile=/etc/kubernetes/pki/etcd/ca.crt
        - --etcd-certfile=/etc/kubernetes/pki/etcd/tls.crt
        - --etcd-keyfile=/etc/kubernetes/pki/etcd/tls.key
        - --runtime-config=admissionregistration.k8s.io/v1=true
        - --storage-media-type=application/json
        - --max-requests-inflight=900
        - --max-mutating-requests-inflight=300
      controllerManager:
        enabled: true
        extraArgs:
        - --controllers=*,-nodeipam,-persistentvolume-binder,-attachdetach,-persistentvolume-expander,-cloud-node-lifecycle,-ttl
        - --feature-gates=WatchList=true,WatchListClient=true,VolumeAttributesClass=true,MutatingAdmissionPolicy=true,CustomResourceFieldSelectors=true
        - --kube-api-burst=90
        - --kube-api-qps=60
      scheduler:
        enabled: false
  coredns:
    enabled: false
  backingStore:
    etcd:
      embedded:
        enabled: false
      deploy:
        enabled: false
    database:
      embedded:
        enabled: false
  statefulSet:
    highAvailability:
      replicas: 1
    persistence:
      volumeClaim:
        enabled: true
        accessModes:
        - ReadWriteOnce
        retentionPolicy: Retain
        size: 5G
        storageClass: standard
      addVolumes:
      - name: etcd-certs
        secret:
          secretName: harikube-middleware-crt
          items:
          - key: ca.crt
            path: ca.crt
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      addVolumeMounts:
        - name: etcd-certs
          mountPath: /etc/kubernetes/pki/etcd
          readOnly: true
  serviceMonitor:
    enabled: false
exportKubeConfig:
  context: harikube-vcluster-context
  server: https://harikube-vcluster.harikube:443
sync:
  toHost:
    serviceAccounts:
      enabled: false
    pods:
      enabled: false
    secrets:
      enabled: true
      all: true
    configMaps:
      enabled: false
    services:
      enabled: false
    endpoints:
      enabled: false
    persistentVolumeClaims:
      enabled: false
  fromHost:
    events:
      enabled: false
    secrets:
      enabled: false
