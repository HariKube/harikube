# Default values for harikube.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

vcluster:
  networkPolicy:
    create: false

mutatingAdmissionPolicy:
  # Specifies whether the MutatingAdmissionPolicy to label non core resources with skip-controller-manager-metadata-caching should be created
  create: false

middleware:
  # Specifies whether the middleware should be created
  create: true
  image:
    repository: quay.io/harikube/harikube
    pullPolicy: IfNotPresent
    tag: release-v1.15.0
  env: []
  args:
  # - --debug=true
  - --log-format=json
  # - --emulated-etcd-version=3.5.13
  - --listen-address=0.0.0.0:2379
  - --metrics-bind-address=:8080
  - --server-cert-file=/etc/harikube-middleware-crt/tls.crt
  - --server-key-file=/etc/harikube-middleware-crt/tls.key
  # - --metrics-enable-profiling=true
  # - --metrics-ignore-tls-config=true
  - --slow-sql-threshold=2s
  # - --slow-sql-warning-threshold=5s
  - --datastore-max-idle-connections=50
  - --datastore-max-open-connections=90
  - --datastore-connection-max-lifetime=5m
  - --endpoint=sqlite:///db/main.db?_journal=WAL&cache=shared
  # - --ca-file=/etc/db/tls/database.crt
  # - --cert-file=/etc/db/tls/database.crt
  # - --key-file=/etc/db/tls/database.key
  # - --skip-verify=true
  # - --watch-progress-notify-interval=5s
  # - --compact-interval=5m
  # - --compact-interval-jitter=0
  # - --compact-timeout=5s
  # - --compact-min-retain=1000
  # - --compact-batch-size=1000
  # - --poll-batch-size=500
  podAnnotations: {}
  podLabels:
    app: harikube-middleware
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  service:
    apiPort:
      type: ClusterIP
      port: 2379
    metrics:
      type: ClusterIP
      port: 8080
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  livenessProbe:
    httpGet:
      scheme: HTTPS
      port: 8080
      path: /metrics
    initialDelaySeconds: 15
    timeoutSeconds: 5
    periodSeconds: 20
    failureThreshold: 3
  readinessProbe:
    httpGet:
      scheme: HTTPS
      port: 8080
      path: /metrics
    initialDelaySeconds: 5
    timeoutSeconds: 3
    periodSeconds: 10
    failureThreshold: 3
  volumes:
  - name: harikube-middleware-crt
    secret:
      secretName: harikube-middleware-crt
  # - name: harikube-endpoint-tls
  #   secret:
  #     secretName: harikube-endpoint-tls
  - name: harikube-middleware-pvc
    persistentVolumeClaim:
      claimName: harikube-middleware-pvc
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: harikube-middleware-crt
    mountPath: /etc/harikube-middleware-crt
    readOnly: true
  # - name: harikube-endpoint-tls
  #   mountPath: /etc/db/tls
  #   readOnly: true
  - name: harikube-middleware-pvc
    mountPath: /db
  - name: tmp
    mountPath: /tmp
  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
              - arm64
              - amd64
              - s390x
              - ppc64le
            - key: kubernetes.io/os
              operator: In
              values:
              - linux
  pvc:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi
    # storageClassName: default
  monitoring:
    create: false
  networkPolicy:
    create: false

apiServer:
  # Specifies whether the api-server should be created
  create: false
  replicas: 1
  image:
    repository: quay.io/harikube/kube-apiserver
    pullPolicy: IfNotPresent
    tag: v1.35.4
  args:
  - --service-cluster-ip-range=10.96.0.0/16
  - --bind-address=0.0.0.0
  - --allow-privileged=true
  - --authorization-mode=Node,RBAC
  - --client-ca-file=/data/pki/client-ca.crt
  - --enable-bootstrap-token-auth=true
  - --proxy-client-cert-file=/data/pki/front-proxy-client.crt
  - --proxy-client-key-file=/data/pki/front-proxy-client.key
  - --requestheader-allowed-names=front-proxy-client
  - --requestheader-client-ca-file=/data/pki/front-proxy-ca.crt
  - --requestheader-extra-headers-prefix=X-Remote-Extra-
  - --requestheader-group-headers=X-Remote-Group
  - --requestheader-username-headers=X-Remote-User
  - --secure-port=8443
  - --service-account-issuer=https://kubernetes.default.svc.cluster.local
  - --service-account-key-file=/data/pki/sa.pub
  - --service-account-signing-key-file=/data/pki/sa.key
  - --tls-cert-file=/etc/harikube-api-server-crt/tls.crt
  - --tls-private-key-file=/etc/harikube-api-server-crt/tls.key
  - --profiling=false
  - --advertise-address=127.0.0.1
  - --endpoint-reconciler-type=none
  - --feature-gates=WatchList=true,WatchListClient=true,VolumeAttributesClass=true,MutatingAdmissionPolicy=true
  - --watch-cache=false
  - --etcd-servers=https://harikube-middleware-svc:2379
  - --etcd-cafile=/etc/kubernetes/pki/etcd/ca.crt
  - --etcd-certfile=/etc/kubernetes/pki/etcd/tls.crt
  - --etcd-keyfile=/etc/kubernetes/pki/etcd/tls.key
  - --runtime-config=admissionregistration.k8s.io/v1beta1=true
  - --storage-media-type=application/json
  - --max-requests-inflight=900
  - --max-mutating-requests-inflight=300
  podAnnotations: {}
  podLabels:
    app: harikube-api-server
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    runAsGroup: 0
    runAsUser: 0
  service:
    apiServer:
      type: ClusterIP
      port: 8443
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 200m
      memory: 256Mi
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: data-harikube-vcluster-0
      readOnly: true
  - name: etcd-certs
    secret:
      defaultMode: 420
      items:
      - key: ca.crt
        path: ca.crt
      - key: tls.crt
        path: tls.crt
      - key: tls.key
        path: tls.key
      secretName: harikube-middleware-crt
  - name: harikube-api-server-crt
    secret:
      defaultMode: 420
      items:
      - key: ca.crt
        path: ca.crt
      - key: tls.crt
        path: tls.crt
      - key: tls.key
        path: tls.key
      secretName: harikube-api-server-crt
  - emptyDir: {}
    name: tmp
  volumeMounts:
  - mountPath: /data
    name: data
  - mountPath: /etc/kubernetes/pki/etcd
    name: etcd-certs
    readOnly: true
  - mountPath: /etc/harikube-api-server-crt
    name: harikube-api-server-crt
    readOnly: true
  - mountPath: /tmp
    name: tmp
  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
              - arm64
              - amd64
              - s390x
              - ppc64le
            - key: kubernetes.io/os
              operator: In
              values:
              - linux
  monitoring:
    create: false
  networkPolicy:
    create: false

controllerManager:
  # Specifies whether the controller-manager should be created
  create: false
  replicas: 1
  image:
    repository: quay.io/harikube/kube-controller-manager
    pullPolicy: IfNotPresent
    tag: v1.35.4
  args:
  - --service-cluster-ip-range=10.96.0.0/16
  - --authentication-kubeconfig=/etc/kubernetes/kubeconfig/config
  - --authorization-kubeconfig=/etc/kubernetes/kubeconfig/config
  - --bind-address=0.0.0.0
  - --client-ca-file=/data/pki/client-ca.crt
  - --cluster-name=kubernetes
  - --cluster-signing-cert-file=/data/pki/server-ca.crt
  - --cluster-signing-key-file=/data/pki/server-ca.key
  - --kubeconfig=/etc/kubernetes/kubeconfig/config
  - --requestheader-client-ca-file=/data/pki/front-proxy-ca.crt
  - --root-ca-file=/data/pki/server-ca.crt
  - --service-account-private-key-file=/data/pki/sa.key
  - --use-service-account-credentials=true
  - --leader-elect=true
  - --node-monitor-grace-period=1h
  - --node-monitor-period=1h
  - --pvclaimbinder-sync-period=60s
  - --horizontal-pod-autoscaler-sync-period=60s
  - --controllers=-nodeipam,-persistentvolume-binder,-attachdetach,-persistentvolume-expander,-cloud-node-lifecycle,-ttl
  - --feature-gates=WatchList=true,WatchListClient=true,VolumeAttributesClass=true,MutatingAdmissionPolicy=true
  - --kube-api-burst=90
  - --kube-api-qps=60
  - --secure-port=10257
  - --leader-elect-resource-name=harikube-controller-manager
  - --tls-cert-file=/etc/harikube-controller-manager-crt/tls.crt
  - --tls-private-key-file=/etc/harikube-controller-manager-crt/tls.key
  podAnnotations: {}
  podLabels:
    app: harikube-controller-manager
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    runAsGroup: 0
    runAsUser: 0
  service:
    https:
      type: ClusterIP
      port: 10257
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 200m
      memory: 256Mi
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: data-harikube-vcluster-0
      readOnly: true
  - name: kubeconfig
    secret:
      defaultMode: 420
      items:
      - key: config
        path: config
      secretName: vc-harikube-vcluster
  - name: harikube-controller-manager-crt
    secret:
      defaultMode: 420
      items:
      - key: ca.crt
        path: ca.crt
      - key: tls.crt
        path: tls.crt
      - key: tls.key
        path: tls.key
      secretName: harikube-controller-manager-crt
  - emptyDir: {}
    name: tmp
  volumeMounts:
  - mountPath: /data
    name: data
  - mountPath: /etc/kubernetes/kubeconfig
    name: kubeconfig
  - mountPath: /etc/harikube-controller-manager-crt
    name: harikube-controller-manager-crt
    readOnly: true
  - mountPath: /tmp
    name: tmp
  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
              - arm64
              - amd64
              - s390x
              - ppc64le
            - key: kubernetes.io/os
              operator: In
              values:
              - linux
  monitoring:
    create: false
  networkPolicy:
    create: false
